name: Entrenador Poisson España

on:
  schedule:
    - cron: '0 */12 * * *' # Se ejecuta cada 12 horas automáticamente
  workflow_dispatch:      # Te permite ejecutarlo manualmente con un botón

permissions:
  contents: write         # NECESARIO para que pueda guardar el modelo_poisson.json

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          # Usamos el token interno de GitHub para tener permisos de escritura
          token: ${{ secrets.BOT_REPO_TOKEN }}

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install requests pandas numpy scipy

      - name: Ejecutar el script Trainer
        env:
          # Este nombre DEBE coincidir con el que pusiste en GitHub Secrets
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python trainer.py

      - name: Subir cambios al repositorio
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add modelo_poisson.json
          # Solo hace el push si el archivo realmente cambió para no ensuciar el historial
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización automática: Modelo Poisson" && git push origin HEAD:main)
